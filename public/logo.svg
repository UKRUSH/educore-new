<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 520 160" fill="none">
  <defs>
    <!-- Deep blue gradient for book/base -->
    <linearGradient id="bookGrad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#1a6fd4"/>
      <stop offset="100%" stop-color="#0d3fa6"/>
    </linearGradient>
    <!-- Bright blue gradient for orb -->
    <radialGradient id="orbGrad" cx="40%" cy="35%" r="60%">
      <stop offset="0%" stop-color="#4ab3f4"/>
      <stop offset="50%" stop-color="#1a8fe0"/>
      <stop offset="100%" stop-color="#0d4fa8"/>
    </radialGradient>
    <!-- Orb overlay highlight -->
    <radialGradient id="orbHighlight" cx="30%" cy="25%" r="50%">
      <stop offset="0%" stop-color="#ffffff" stop-opacity="0.35"/>
      <stop offset="100%" stop-color="#ffffff" stop-opacity="0"/>
    </radialGradient>
    <!-- Swoosh gradient -->
    <linearGradient id="swooshGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#40c0f8"/>
      <stop offset="100%" stop-color="#1a70d4"/>
    </linearGradient>
    <!-- Text gradient -->
    <linearGradient id="textGrad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#1aadee"/>
      <stop offset="60%" stop-color="#1a8fe0"/>
      <stop offset="100%" stop-color="#0d3fa6"/>
    </linearGradient>
    <!-- Book page highlight -->
    <linearGradient id="pageGrad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#5ac8ff"/>
      <stop offset="100%" stop-color="#1a70d4"/>
    </linearGradient>
    <!-- Drop shadow filter -->
    <filter id="shadow" x="-10%" y="-10%" width="120%" height="130%">
      <feDropShadow dx="0" dy="3" stdDeviation="4" flood-color="#0d3fa6" flood-opacity="0.25"/>
    </filter>
    <filter id="glowStar" x="-50%" y="-50%" width="200%" height="200%">
      <feDropShadow dx="0" dy="0" stdDeviation="2" flood-color="#5ad4ff" flood-opacity="0.8"/>
    </filter>
  </defs>

  <!-- ── OPEN BOOK ─────────────────────────────────────────── -->
  <!-- Left page -->
  <path d="M28 112 Q52 96 80 100 L80 140 Q52 136 28 148 Z" fill="url(#bookGrad)" filter="url(#shadow)"/>
  <!-- Right page -->
  <path d="M132 100 Q160 96 156 112 L156 148 Q132 136 132 140 Z" fill="url(#bookGrad)" filter="url(#shadow)"/>
  <!-- Book spine -->
  <path d="M80 100 L80 140 L84 142 L88 140 L88 100 Z" fill="#0a2d80"/>
  <!-- Page lines left -->
  <path d="M40 118 Q60 112 78 114" stroke="url(#pageGrad)" strokeWidth="2.5" strokeLinecap="round" fill="none" opacity="0.8"/>
  <path d="M38 126 Q60 120 78 122" stroke="url(#pageGrad)" strokeWidth="2" strokeLinecap="round" fill="none" opacity="0.6"/>
  <path d="M38 133 Q60 127 78 129" stroke="url(#pageGrad)" strokeWidth="1.5" strokeLinecap="round" fill="none" opacity="0.4"/>
  <!-- Page lines right -->
  <path d="M90 114 Q112 112 142 118" stroke="url(#pageGrad)" strokeWidth="2.5" strokeLinecap="round" fill="none" opacity="0.8"/>
  <path d="M90 122 Q112 120 144 126" stroke="url(#pageGrad)" strokeWidth="2" strokeLinecap="round" fill="none" opacity="0.6"/>
  <path d="M90 129 Q112 127 144 133" stroke="url(#pageGrad)" strokeWidth="1.5" strokeLinecap="round" fill="none" opacity="0.4"/>

  <!-- ── ORB / CIRCLE ───────────────────────────────────────── -->
  <circle cx="92" cy="68" r="58" fill="url(#orbGrad)" filter="url(#shadow)"/>
  <circle cx="92" cy="68" r="58" fill="url(#orbHighlight)"/>
  <!-- Orb ring -->
  <circle cx="92" cy="68" r="55" stroke="#5ac8ff" strokeWidth="1.5" fill="none" opacity="0.4"/>

  <!-- ── SWOOSH ARC ─────────────────────────────────────────── -->
  <path d="M46 38 Q60 14 92 12 Q124 14 138 38"
    stroke="url(#swooshGrad)" strokeWidth="5" fill="none" strokeLinecap="round" opacity="0.9"/>

  <!-- ── LETTER E ────────────────────────────────────────────── -->
  <text x="72" y="85" font-family="Arial Black, Arial" font-weight="900" font-size="52"
    fill="white" opacity="0.95" letter-spacing="-1">E</text>

  <!-- ── PERSON / JUMPING FIGURE ───────────────────────────── -->
  <!-- Head -->
  <circle cx="114" cy="44" r="8" fill="white" opacity="0.92"/>
  <!-- Body leaping -->
  <path d="M114 52 Q118 62 122 70" stroke="white" strokeWidth="4" strokeLinecap="round" fill="none" opacity="0.85"/>
  <!-- Left arm up -->
  <path d="M114 60 Q106 50 102 44" stroke="white" strokeWidth="3.5" strokeLinecap="round" fill="none" opacity="0.85"/>
  <!-- Right arm -->
  <path d="M116 62 Q124 60 130 56" stroke="white" strokeWidth="3.5" strokeLinecap="round" fill="none" opacity="0.85"/>
  <!-- Left leg -->
  <path d="M118 70 Q114 80 108 86" stroke="white" strokeWidth="3.5" strokeLinecap="round" fill="none" opacity="0.85"/>
  <!-- Right leg -->
  <path d="M122 70 Q126 80 130 82" stroke="white" strokeWidth="3.5" strokeLinecap="round" fill="none" opacity="0.85"/>

  <!-- ── SPARKLE STARS ──────────────────────────────────────── -->
  <!-- Large star top-right -->
  <g filter="url(#glowStar)" transform="translate(144, 18)">
    <path d="M6 0 L7.2 4.8 L12 6 L7.2 7.2 L6 12 L4.8 7.2 L0 6 L4.8 4.8 Z" fill="#5adcff"/>
  </g>
  <!-- Medium star -->
  <g filter="url(#glowStar)" transform="translate(156, 8)">
    <path d="M4 0 L4.9 3.1 L8 4 L4.9 4.9 L4 8 L3.1 4.9 L0 4 L3.1 3.1 Z" fill="#a0eeff"/>
  </g>
  <!-- Small star -->
  <g filter="url(#glowStar)" transform="translate(136, 8)">
    <path d="M3 0 L3.6 2.4 L6 3 L3.6 3.6 L3 6 L2.4 3.6 L0 3 L2.4 2.4 Z" fill="#80d8f8"/>
  </g>
  <!-- Tiny dot star -->
  <circle cx="162" cy="26" r="2" fill="#c0eeff" opacity="0.8" filter="url(#glowStar)"/>

  <!-- ── WORDMARK "EduCore" ──────────────────────────────────── -->
  <text x="178" y="95"
    font-family="'Arial Black', 'Helvetica Neue', Arial, sans-serif"
    font-weight="900"
    font-size="68"
    fill="url(#textGrad)"
    letter-spacing="-1">EduCore</text>

  <!-- ── TAGLINE ────────────────────────────────────────────── -->
  <text x="182" y="122"
    font-family="Arial, Helvetica, sans-serif"
    font-weight="700"
    font-size="15"
    fill="#0d4fa8"
    letter-spacing="4">STUDENT SUPPORT SYSTEM</text>
</svg>
